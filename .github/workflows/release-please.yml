name: Release Please

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          target-branch: master

  build-platform:
    name: Build and Test
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: mac
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x64
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
      PLATFORM: ${{ matrix.platform }}
      ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build & assemble client layout
        # use appropriate gradlew on each runner
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "Running on Windows"
            ./gradlew.bat --no-daemon clean build runtime assembleClientLayout -PtargetPlatform=${{ matrix.platform }} -PtargetArch=${{ matrix.arch }} -PreleaseVersion=${{ env.VERSION }}
          else
            ./gradlew --no-daemon clean build runtime assembleClientLayout -PtargetPlatform=${{ matrix.platform }} -PtargetArch=${{ matrix.arch }} -PreleaseVersion=${{ env.VERSION }}
          fi

      - name: Prepare artifacts directory
        shell: bash
        run: |
          mkdir -p artifacts
          # copy built output (module path)
          cp -R run/client/build/output ./artifacts

      - name: Upload platform artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.platform }}
          path: artifacts

  # Отдельный job — запускается строго после того как ВСЕ платформы готовы
  build-manifest:
    name: Build & Sign manifest
    needs: [ release-please, build-platform ]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install manifest tools
        run: npm ci

      # Скачиваем все три платформы чтобы manifest был полным
      - name: Download linux artifact
        uses: actions/download-artifact@v8
        with:
          name: artifacts-linux
          path: ./downloads/linux

      - name: Download mac artifact
        uses: actions/download-artifact@v8
        with:
          name: artifacts-mac
          path: ./downloads/mac

      - name: Download windows artifact
        uses: actions/download-artifact@v8
        with:
          name: artifacts-windows
          path: ./downloads/windows

      - name: Unpack artifacts
        run: |
          set -euo pipefail
          for platform in linux mac windows; do
            echo "Copying downloads/$platform -> unpacked/$platform"
            mkdir -p unpacked/$platform
            cp -R downloads/$platform/* unpacked/$platform/ || true
          done

      # Строим манифест для каждой платформы отдельно
      - name: Build manifests per platform
        env:
          MANIFEST_PRIVATE_KEY: ${{ secrets.MANIFEST_PRIVATE_KEY }}
        run: |
          for platform in linux mac windows; do
            echo "Building manifest for $platform..."
            mkdir -p out/manifest/$platform
            node scripts/build-manifest.js \
              --src=unpacked/$platform \
              --out=out/manifest/$platform \
              --version=${{ env.VERSION }} \
              --platform=$platform
            node scripts/sign-manifest.js \
              out/manifest/$platform/manifest.json \
              out/manifest/$platform/manifest.signed.json
          done
          ls -laR out/manifest

      - name: Upload manifests artifact
        uses: actions/upload-artifact@v7
        with:
          name: manifests
          path: out/manifest/

  publish:
    name: Publish ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs: [ release-please, build-platform, build-manifest ]
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      matrix:
        platform: [ linux, mac, windows ]
      fail-fast: false
    steps:
      - name: Download platform artifact (${{ matrix.platform }})
        uses: actions/download-artifact@v8
        with:
          name: artifacts-${{ matrix.platform }}
          path: ./downloads/raw

      - name: Download manifests
        uses: actions/download-artifact@v8
        with:
          name: manifests
          path: ./downloads/manifest

      - name: Prepare rsync payload
        run: |
          set -euo pipefail
          VERSION=${{ needs.release-please.outputs.version }}
          PLATFORM=${{ matrix.platform }}
          
          mkdir -p flat
          
          if [[ -d downloads/raw/output ]]; then
            cp -r downloads/raw/output/. flat/
          else
            cp -r downloads/raw/. flat/
          fi
          
          rm -rf flat/manifest
          
          cp "downloads/manifest/${PLATFORM}/manifest.signed.json" flat/manifest.signed.json
          
          echo "=== flat/ structure ==="
          ls -laR flat | head -60
          
          mkdir -p "payload_archive/${VERSION}/${PLATFORM}"
          cp -r flat/. "payload_archive/${VERSION}/${PLATFORM}/"

          mkdir -p "payload_latest/${PLATFORM}"
          cp -r flat/. "payload_latest/${PLATFORM}/"

      - name: Upload to update server (archive)
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avz --checksum
          path: payload_archive/
          remote_path: ${{ secrets.UPDATE_SERVER_PATH }}/archive/
          remote_host: ${{ secrets.UPDATE_SERVER_HOST }}
          remote_port: ${{ secrets.UPDATE_SERVER_PORT }}
          remote_user: ${{ secrets.UPDATE_SERVER_USER }}
          remote_key: ${{ secrets.UPDATE_SERVER_KEY }}

      - name: Upload to update server (latest)
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avz --delete --checksum
          path: payload_latest/${{ matrix.platform }}/
          remote_path: ${{ secrets.UPDATE_SERVER_PATH }}/latest/${{ matrix.platform }}/
          remote_host: ${{ secrets.UPDATE_SERVER_HOST }}
          remote_port: ${{ secrets.UPDATE_SERVER_PORT }}
          remote_user: ${{ secrets.UPDATE_SERVER_USER }}
          remote_key: ${{ secrets.UPDATE_SERVER_KEY }}
  
  sync-master-to-dev:
    name: Sync master -> dev
    needs: publish
    if: needs.publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Create PR from master to dev
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = 'dev';
            const head = 'master';

            const compare = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${base}...${head}`
            });

            if (compare.data.ahead_by === 0) {
              core.info('No new commits to sync from master to dev.');
              return;
            }

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base,
              head: `${owner}:${head}`
            });

            if (existing.data.length > 0) {
              core.info(`Sync PR already exists: #${existing.data[0].number}`);
              return;
            }

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              base,
              head,
              title: 'chore: sync master into dev after release',
              body: [
                'Automated sync PR created after successful release.',
                '',
                '- Source branch: `master`',
                '- Target branch: `dev`'
              ].join('\n')
            });

            core.info(`Created sync PR #${pr.data.number}`);
