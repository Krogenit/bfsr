name: Release Please

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          target-branch: master

  build-platform:
    name: Build and Test
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: mac
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x64
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
      PLATFORM: ${{ matrix.platform }}
      ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build & assemble client layout
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "Running on Windows"
            ./gradlew.bat --no-daemon clean assembleClientLayout -PtargetPlatform=${{ matrix.platform }} -PtargetArch=${{ matrix.arch }} -PreleaseVersion=${{ env.VERSION }}
          else
            ./gradlew --no-daemon clean assembleClientLayout -PtargetPlatform=${{ matrix.platform }} -PtargetArch=${{ matrix.arch }} -PreleaseVersion=${{ env.VERSION }}
          fi

      - name: Upload platform artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.platform }}
          path: run/client/build/output/platform

      - name: Upload shared artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-shared
          path: run/client/build/output/shared
  
  build-manifest:
    name: Build & Sign manifest
    needs: [ release-please, build-platform ]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install manifest tools
        run: npm ci

      - name: Download shared artifact
        uses: actions/download-artifact@v8
        with:
          name: artifacts-shared
          path: ./downloads/shared

      - name: Download linux artifact
        uses: actions/download-artifact@v8
        with:
          name: artifacts-linux
          path: ./downloads/linux

      - name: Download mac artifact
        uses: actions/download-artifact@v8
        with:
          name: artifacts-mac
          path: ./downloads/mac

      - name: Download windows artifact
        uses: actions/download-artifact@v8
        with:
          name: artifacts-windows
          path: ./downloads/windows

      - name: Merge artifacts into unpacked/
        run: |
          set -euo pipefail
          for platform in linux mac windows; do
            echo "Merging shared + ${platform} -> unpacked/${platform}"
            mkdir -p unpacked/${platform}
            cp -r downloads/shared/. unpacked/${platform}/
            cp -r downloads/${platform}/. unpacked/${platform}/
          done

      - name: Build manifests per platform
        env:
          MANIFEST_PRIVATE_KEY: ${{ secrets.MANIFEST_PRIVATE_KEY }}
        run: |
          for platform in linux mac windows; do
            echo "Building manifest for $platform..."
            mkdir -p out/manifest/$platform
            node scripts/build-manifest.js \
              --src=unpacked/$platform \
              --out=out/manifest/$platform \
              --version=${{ env.VERSION }} \
              --platform=$platform
            node scripts/sign-manifest.js \
              out/manifest/$platform/manifest.json \
              out/manifest/$platform/manifest.signed.json
          done

      - name: Upload manifests artifact
        uses: actions/upload-artifact@v7
        with:
          name: manifests
          path: out/manifest/

  publish-shared:
    name: Publish shared assets
    runs-on: ubuntu-latest
    needs: [ release-please, build-platform, build-manifest ]
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Download shared artifact
        uses: actions/download-artifact@v8
        with:
          name: artifacts-shared
          path: ./shared

      - name: Show shared structure
        run: ls -la shared/

      - name: Upload shared to update server
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avz --checksum
          path: shared/
          remote_path: ${{ secrets.UPDATE_SERVER_PATH }}/shared/
          remote_host: ${{ secrets.UPDATE_SERVER_HOST }}
          remote_port: ${{ secrets.UPDATE_SERVER_PORT }}
          remote_user: ${{ secrets.UPDATE_SERVER_USER }}
          remote_key: ${{ secrets.UPDATE_SERVER_KEY }}

  publish:
    name: Publish ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs: [ release-please, build-platform, build-manifest, publish-shared ]
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      matrix:
        platform: [ linux, mac, windows ]
      fail-fast: false
    steps:
      - name: Download platform artifact (${{ matrix.platform }})
        uses: actions/download-artifact@v8
        with:
          name: artifacts-${{ matrix.platform }}
          path: ./downloads/platform

      - name: Download shared artifact
        uses: actions/download-artifact@v8
        with:
          name: artifacts-shared
          path: ./downloads/shared

      - name: Download manifests
        uses: actions/download-artifact@v8
        with:
          name: manifests
          path: ./downloads/manifest

      - name: Prepare rsync payload
        run: |
          set -euo pipefail
          VERSION=${{ needs.release-please.outputs.version }}
          PLATFORM=${{ matrix.platform }}
          
          mkdir -p flat
          cp -r downloads/shared/. flat/
          cp -r downloads/platform/. flat/
          
          cp "downloads/manifest/${PLATFORM}/manifest.signed.json" flat/manifest.signed.json
          
          echo "=== flat/ structure ==="
          ls -la flat/
          
          mkdir -p "payload_archive/${VERSION}/${PLATFORM}"
          cp -r flat/. "payload_archive/${VERSION}/${PLATFORM}/"

          mkdir -p "payload_latest/${PLATFORM}"
          cp -r flat/. "payload_latest/${PLATFORM}/"

      - name: Upload to update server (archive)
        uses: burnett01/rsync-deployments@v8
        with:
          switches: >-
            -avz --checksum
            --link-dest=${{ secrets.UPDATE_SERVER_PATH }}/shared
          path: payload_archive/
          remote_path: ${{ secrets.UPDATE_SERVER_PATH }}/archive/
          remote_host: ${{ secrets.UPDATE_SERVER_HOST }}
          remote_port: ${{ secrets.UPDATE_SERVER_PORT }}
          remote_user: ${{ secrets.UPDATE_SERVER_USER }}
          remote_key: ${{ secrets.UPDATE_SERVER_KEY }}

      - name: Upload to update server (latest)
        uses: burnett01/rsync-deployments@v8
        with:
          switches: >-
            -avz --delete --checksum
            --link-dest=${{ secrets.UPDATE_SERVER_PATH }}/shared
          path: payload_latest/${{ matrix.platform }}/
          remote_path: ${{ secrets.UPDATE_SERVER_PATH }}/latest/${{ matrix.platform }}/
          remote_host: ${{ secrets.UPDATE_SERVER_HOST }}
          remote_port: ${{ secrets.UPDATE_SERVER_PORT }}
          remote_user: ${{ secrets.UPDATE_SERVER_USER }}
          remote_key: ${{ secrets.UPDATE_SERVER_KEY }}
  
  sync-master-to-dev:
    name: Sync master -> dev
    needs: publish
    if: needs.publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Create PR from master to dev
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = 'dev';
            const head = 'master';

            const compare = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${base}...${head}`
            });

            if (compare.data.ahead_by === 0) {
              core.info('No new commits to sync from master to dev.');
              return;
            }

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base,
              head: `${owner}:${head}`
            });

            if (existing.data.length > 0) {
              core.info(`Sync PR already exists: #${existing.data[0].number}`);
              return;
            }

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              base,
              head,
              title: 'chore: sync master into dev after release',
              body: [
                'Automated sync PR created after successful release.',
                '',
                '- Source branch: `master`',
                '- Target branch: `dev`'
              ].join('\n')
            });

            core.info(`Created sync PR #${pr.data.number}`);
